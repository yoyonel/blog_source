repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/biomejs/pre-commit
    rev: v2.4.9
    hooks:
      - id: biome-check
        additional_dependencies: ["@biomejs/biome@2.4.9"]
