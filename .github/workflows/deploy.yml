name: Deploy Blog

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Build site
        run: uv run pelican content -o output -s publishconf.py

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          repository-name: yoyonel/yoyonel.github.io
          branch: main
          folder: output
          # Create a deploy key (ssh-keygen -t ed25519) and add:
          # - Public key as Deploy Key (with write access) on yoyonel.github.io repo
          # - Private key as Secret named DEPLOY_KEY on blog_source repo
          ssh-key: ${{ secrets.DEPLOY_KEY }}
