name: Performance Audit

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [master, main]

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq chromium-browser

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv sync

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: |
          npm install
          npm install -g @mermaid-js/mermaid-cli

      - name: Configure puppeteer for CI
        run: |
          CHROMIUM_PATH=$(which chromium-browser || which chromium)
          cat > puppeteer.json << EOF
          {
            "executablePath": "${CHROMIUM_PATH}",
            "args": ["--no-sandbox", "--disable-setuid-sandbox", "--disable-gpu"]
          }
          EOF

      - name: Build site
        run: uv run pelican content -o output -s pelicanconf.py

      - name: Run Lighthouse audit
        id: audit
        run: |
          # Start local server
          python3 -m http.server 9222 -d output &>/dev/null &
          sleep 2

          SLUG="suckless-ogl-anatomie-frame.html"
          CHROMIUM_PATH=$(which chromium-browser || which chromium)
          mkdir -p lighthouse-reports

          # Run 3 audits for stable median
          for i in 1 2 3; do
            npx lighthouse "http://localhost:9222/${SLUG}" \
              --chrome-flags="--headless --no-sandbox --disable-gpu" \
              --chrome-path="${CHROMIUM_PATH}" \
              --output=json \
              --output-path="lighthouse-reports/run-${i}" \
              --only-categories=performance \
              --throttling-method=simulate \
              --preset=desktop \
              --quiet 2>/dev/null
          done

          # Also generate HTML report from last run
          npx lighthouse "http://localhost:9222/${SLUG}" \
            --chrome-flags="--headless --no-sandbox --disable-gpu" \
            --chrome-path="${CHROMIUM_PATH}" \
            --output=html \
            --output-path="lighthouse-reports/${SLUG%.html}" \
            --only-categories=performance \
            --throttling-method=simulate \
            --preset=desktop \
            --quiet 2>/dev/null

          kill %1 2>/dev/null || true

          # Compute median and generate summary
          python3 << 'PYEOF'
          import json, statistics, os

          scores = {"perf": [], "fcp": [], "lcp": [], "tbt": [], "cls": [], "si": []}
          for i in range(1, 4):
            path = f"lighthouse-reports/run-{i}"
            if not os.path.isfile(path):
              path = f"lighthouse-reports/run-{i}.report.json"
            with open(path) as f:
              r = json.load(f)
            a = r["audits"]
            scores["perf"].append(r["categories"]["performance"]["score"] * 100)
            scores["fcp"].append(a["first-contentful-paint"]["numericValue"] / 1000)
            scores["lcp"].append(a["largest-contentful-paint"]["numericValue"] / 1000)
            scores["tbt"].append(a["total-blocking-time"]["numericValue"])
            scores["cls"].append(a["cumulative-layout-shift"]["numericValue"])
            scores["si"].append(a["speed-index"]["numericValue"] / 1000)

          def med(key):
            return statistics.median(scores[key])

          perf = med("perf")

          # Thresholds
          def status(val, good, higher_better=False):
            if higher_better:
              return "🟢" if val >= good else ("🟠" if val >= good * 0.5 else "🔴")
            return "🟢" if val <= good else ("🟠" if val <= good * 1.5 else "🔴")

          # Write markdown summary
          lines = []
          lines.append("## 📊 Lighthouse Performance Audit")
          lines.append("")
          lines.append(f"**Page:** `suckless-ogl-anatomie-frame.html` — Median of 3 runs (desktop)")
          lines.append("")
          lines.append("| Metric | Value | Status | Threshold |")
          lines.append("|--------|------:|:------:|:---------:|")

          metrics = [
            ("Performance Score", med("perf"), "", 90, True),
            ("First Contentful Paint", med("fcp"), "s", 1.8, False),
            ("Largest Contentful Paint", med("lcp"), "s", 2.5, False),
            ("Total Blocking Time", med("tbt"), "ms", 200, False),
            ("Cumulative Layout Shift", med("cls"), "", 0.1, False),
            ("Speed Index", med("si"), "s", 3.4, False),
          ]

          for name, val, unit, threshold, hb in metrics:
            s = status(val, threshold, hb)
            op = "≥" if hb else "≤"
            lines.append(f"| {name} | {val:.2f}{unit} | {s} | {op} {threshold}{unit} |")

          summary = "\n".join(lines)

          # Write outputs
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            # Use delimiter for multiline
            f.write(f"score={int(perf)}\n")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
            f.write(summary + "\n")

          with open("lighthouse-reports/pr-comment.md", "w") as f:
            f.write(summary + "\n")

          # Print to log
          print(summary)
          PYEOF

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: lighthouse-reports/
          retention-days: 30

      - name: Comment PR with performance report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('lighthouse-reports/pr-comment.md', 'utf8')
              + `\n\n_Run at ${new Date().toISOString()} · [Full report](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Lighthouse Performance Audit')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if score below threshold
        run: |
          SCORE=${{ steps.audit.outputs.score }}
          echo "Performance score: ${SCORE}"
          if [[ "${SCORE}" -lt 50 ]]; then
            echo "::error::Performance score ${SCORE} is below minimum threshold of 50"
            exit 1
          fi
